name: Upstream Sync

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upstream-sync:
    name: Keep main synchronized with TheOrcDev upstream
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch latest
        run: |
          git remote add upstream https://github.com/TheOrcDev/videorc.git || true
          git fetch upstream
          git checkout main
          git pull --ff-only origin main

      - name: Create sync branch and apply upstream merge
        run: |
          SYNC_BRANCH="sync/upstream-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$SYNC_BRANCH"
          git merge --no-ff --no-edit upstream/main
          if [ $? -ne 0 ]; then
            echo "merge with upstream/main failed"
            exit 1
          fi
          git push -u origin "$SYNC_BRANCH"

      - name: Open or update upstream sync PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "upstream/main is already in HEAD; no PR needed"
            exit 0
          fi

          OPEN_PR_NUMBER="$(gh pr list --head sync/upstream- --state open --json number --jq '.[0].number' || true)"
          if [ -n "$OPEN_PR_NUMBER" ]; then
            gh pr comment "$OPEN_PR_NUMBER" --body "Auto-sync refreshed at $(date -u +%Y-%m-%dT%H:%M:%SZ)." || true
            gh pr edit "$OPEN_PR_NUMBER" --title "Sync TheOrcDev/videorc upstream" --body "Automated sync of upstream/main into fork main." || true
            echo "updated upstream sync PR #${OPEN_PR_NUMBER}"
          else
            gh pr create \
              --title "Sync TheOrcDev/videorc upstream" \
              --body "Automated sync of upstream/main into fork main after scheduled run." \
              --base main \
              --head "$(git rev-parse --abbrev-ref HEAD)" || true
          fi
